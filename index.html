*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F2F0EB;
  --surface: #FAFAF8;
  --surface2: #ECEAE4;
  --border: #DDDBD4;
  --text: #1A1916;
  --muted: #888580;
  --accent: #1A1916;
  --tag: #E4E1DA;
  --radius: 8px;
}
[data-dark] {
  --bg: #111110;
  --surface: #1A1917;
  --surface2: #222119;
  --border: #2C2A24;
  --text: #F0EDE6;
  --muted: #666460;
  --accent: #F0EDE6;
  --tag: #252320;
}

body {
  font-family: 'KudosSans', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; transition: background .2s, color .2s;
}

/* ─── HEADER ─── */
header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  transition: background .2s, border-color .2s; gap: 16px;
}
.logo { font-size: 13px; font-weight: 500; letter-spacing: .05em; color: var(--muted); white-space: nowrap; }
.logo b { color: var(--text); font-weight: 600; }

.header-mid { display: flex; align-items: center; gap: 6px; flex: 1; justify-content: center; }

/* Font switcher */
.font-switcher { display: flex; gap: 4px; }
.font-btn {
  padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface2); font-size: 12px; color: var(--muted); cursor: pointer;
  transition: all .13s; font-weight: 500;
}
.font-btn:hover { border-color: var(--text); color: var(--text); }
.font-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.font-btn.kudos { font-family: 'KudosSans', sans-serif; }
.font-btn.pretendard { font-family: 'Pretendard', sans-serif; }

.header-right { display: flex; gap: 8px; align-items: center; }

.theme-btn {
  width: 34px; height: 20px; border-radius: 100px;
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; padding: 2px;
  transition: background .2s; flex-shrink: 0;
}
.theme-btn::after {
  content: ''; width: 14px; height: 14px; border-radius: 50%;
  background: var(--muted); transition: transform .2s, background .2s;
}
[data-dark] .theme-btn::after { transform: translateX(14px); background: var(--text); }

/* ─── LAYOUT ─── */
.layout { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 53px); }

/* ─── PANEL ─── */
.panel {
  background: var(--surface); border-right: 1px solid var(--border);
  padding: 20px 16px; display: flex; flex-direction: column; gap: 22px;
  overflow-y: auto; transition: background .2s, border-color .2s;
}
.sec-label {
  font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px; font-weight: 500;
}

/* ─── CONTROLS ─── */
.ctrl { display: flex; flex-direction: column; gap: 16px; }
.ctrl-row { display: flex; flex-direction: column; gap: 7px; }
.ctrl-head { display: flex; justify-content: space-between; }
.ctrl-name { font-size: 12px; color: var(--muted); }
.ctrl-val { font-size: 12px; font-weight: 600; color: var(--text); }

input[type=range] {
  -webkit-appearance: none; width: 100%; height: 2px;
  background: var(--border); border-radius: 1px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
  background: var(--accent); cursor: pointer; transition: transform .15s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

/* ─── DEFAULT WEIGHT LIST ─── */
.weight-list { display: flex; flex-direction: column; gap: 4px; }
.weight-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--surface2); cursor: pointer; transition: all .13s; user-select: none;
}
.weight-item:hover { border-color: var(--accent); }
.weight-item.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.weight-name { font-size: 13px; }
.weight-num { font-size: 10px; opacity: .5; }
.weight-item.active .weight-num { opacity: .6; }

/* ─── BG COLORS ─── */
.bg-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.bg-pill {
  width: 26px; height: 26px; border-radius: 6px; cursor: pointer;
  border: 2px solid transparent; transition: transform .15s, border-color .15s;
}
.bg-pill:hover { transform: scale(1.15); }
.bg-pill.active { border-color: var(--accent); }

/* ─── MAIN ─── */
main { display: flex; flex-direction: column; }

.toolbar {
  padding: 10px 24px; border-bottom: 1px solid var(--border);
  background: var(--surface); display: flex; align-items: center; gap: 8px;
  transition: background .2s, border-color .2s; flex-wrap: wrap;
}
.tb-label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); flex-shrink: 0; }
.preset-btns { display: flex; gap: 5px; flex-wrap: wrap; }
.preset-btn {
  padding: 4px 11px; border-radius: 5px; border: 1px solid var(--border);
  background: var(--surface2); font-size: 12px; color: var(--muted); cursor: pointer;
  transition: all .13s; font-family: inherit;
}
.preset-btn:hover { border-color: var(--text); color: var(--text); }
.preset-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

/* ─── CANVAS ─── */
.canvas {
  flex: 1; padding: 52px 64px; overflow-y: auto;
  transition: background .2s; min-height: 400px;
}
.canvas[data-bg="white"] { background: #fff; }
.canvas[data-bg="black"] { background: #080807; }
.canvas[data-bg="paper"] { background: #F8F5EF; }
.canvas[data-bg="slate"] { background: #1C2235; }
.canvas[data-bg="theme"] { background: var(--bg); }

/* ─── LINES ─── */
.lines { display: flex; flex-direction: column; gap: 0; }

.line-wrap { position: relative; }
.line-wrap:hover .line-toolbar { opacity: 1; pointer-events: all; }

/* 줄 툴바 - 줄 아래에 뜨는 방식 */
.line-toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; margin-top: 4px; margin-bottom: 8px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); opacity: 0; pointer-events: none;
  transition: opacity .15s; flex-wrap: wrap;
}
.line-toolbar.pinned { opacity: 1; pointer-events: all; }

.lc-label { font-size: 10px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; flex-shrink: 0; }
.lc-pills { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
.lc-pill {
  padding: 3px 9px; border-radius: 4px; border: 1px solid var(--border);
  background: var(--surface2); font-size: 11px; color: var(--muted); cursor: pointer;
  transition: all .12s; white-space: nowrap;
}
.lc-pill:hover { border-color: var(--text); color: var(--text); }
.lc-pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.lc-actions { display: flex; gap: 4px; flex-shrink: 0; margin-left: auto; }
.lc-btn {
  padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border);
  background: var(--surface2); font-size: 11px; color: var(--muted); cursor: pointer;
  transition: all .12s; line-height: 1.4;
}
.lc-btn:hover { border-color: var(--text); color: var(--text); }
.lc-btn.del:hover { border-color: #c0392b; color: #c0392b; }

/* 텍스트 영역 */
.line-text {
  width: 100%; outline: none; border: none; background: transparent;
  caret-color: currentColor; resize: none; overflow: hidden;
  font-family: inherit; min-height: 1.2em;
  display: block; white-space: pre-wrap; word-break: break-word;
}

/* ─── INFO BAR ─── */
.infobar {
  padding: 8px 24px; border-top: 1px solid var(--border);
  background: var(--surface); display: flex; gap: 20px; flex-wrap: wrap;
  transition: background .2s, border-color .2s;
}
.info-item { font-size: 11px; color: var(--muted); }
.info-item b { color: var(--text); }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo"><b>Font</b> Tester</div>

  <div class="header-mid">
    <div class="font-switcher">
      <button class="font-btn kudos active" onclick="setActiveFont('kudos', this)">Kudos Sans</button>
      <button class="font-btn pretendard" onclick="setActiveFont('pretendard', this)">Pretendard</button>
      <button class="font-btn wanted" onclick="setActiveFont('wanted', this)">Wanted Sans</button>
      <button class="font-btn paperlogy" onclick="setActiveFont('paperlogy', this)">Paperlogy</button>
      <button class="font-btn suit" onclick="setActiveFont('suit', this)">SUIT</button>
    </div>
  </div>

  <div class="header-right">
    <div id="themeBtn" class="theme-btn" onclick="toggleTheme()" title="다크/라이트 전환"></div>
  </div>
</header>

<div class="layout">
  <!-- PANEL -->
  <aside class="panel">

    <div>
      <div class="sec-label">타이포그래피</div>
      <div class="ctrl">
        <div class="ctrl-row">
          <div class="ctrl-head">
            <span class="ctrl-name">크기 (px)</span>
            <span class="ctrl-val" id="vSize">48</span>
          </div>
          <input type="range" id="sSize" min="8" max="220" value="48" step="1"
            oninput="updateGlobal('size', this.value)">
        </div>
        <div class="ctrl-row">
          <div class="ctrl-head">
            <span class="ctrl-name">행간 (line-height)</span>
            <span class="ctrl-val" id="vLH">1.10</span>
          </div>
          <input type="range" id="sLH" min="0.7" max="3.0" value="1.10" step="0.02"
            oninput="updateGlobal('lh', this.value)">
        </div>
        <div class="ctrl-row">
          <div class="ctrl-head">
            <span class="ctrl-name">자간 (letter-spacing)</span>
            <span class="ctrl-val" id="vLS">-0.02em</span>
          </div>
          <input type="range" id="sLS" min="-0.1" max="0.4" value="-0.02" step="0.005"
            oninput="updateGlobal('ls', this.value)">
        </div>
      </div>
    </div>

    <div>
      <div class="sec-label">배경색</div>
      <div class="bg-pills">
        <div class="bg-pill active" data-bg="theme" style="background:var(--bg);box-shadow:inset 0 0 0 1px #ccc8c2;" onclick="setBG(this)" title="테마"></div>
        <div class="bg-pill" data-bg="paper" style="background:#F8F5EF;box-shadow:inset 0 0 0 1px #d8d4ce;" onclick="setBG(this)" title="페이퍼"></div>
        <div class="bg-pill" data-bg="white" style="background:#fff;box-shadow:inset 0 0 0 1px #ddd;" onclick="setBG(this)" title="화이트"></div>
        <div class="bg-pill" data-bg="black" style="background:#080807;" onclick="setBG(this)" title="블랙"></div>
        <div class="bg-pill" data-bg="slate" style="background:#1C2235;" onclick="setBG(this)" title="슬레이트"></div>
      </div>
    </div>

    <div>
      <div class="sec-label">텍스트 색상</div>
      <div class="bg-pills" id="textColors">
        <div class="bg-pill active" data-color="#1A1916" style="background:#1A1916;" onclick="setTextColor(this)"></div>
        <div class="bg-pill" data-color="#555250" style="background:#555250;" onclick="setTextColor(this)"></div>
        <div class="bg-pill" data-color="#F0EDE6" style="background:#F0EDE6;box-shadow:inset 0 0 0 1px #aaa;" onclick="setTextColor(this)"></div>
        <div class="bg-pill" data-color="#ffffff" style="background:#fff;box-shadow:inset 0 0 0 1px #ccc;" onclick="setTextColor(this)"></div>
        <div class="bg-pill" data-color="#D94F2A" style="background:#D94F2A;" onclick="setTextColor(this)"></div>
        <div class="bg-pill" data-color="#2A60D9" style="background:#2A60D9;" onclick="setTextColor(this)"></div>
      </div>
    </div>

  </aside>

  <!-- MAIN -->
  <main>
    <div class="toolbar">
      <span class="tb-label">프리셋</span>
      <div class="preset-btns">
        <button class="preset-btn active" onclick="applyPreset(this,'display')">Display</button>
        <button class="preset-btn" onclick="applyPreset(this,'headline')">Headline</button>
        <button class="preset-btn" onclick="applyPreset(this,'subheading')">Subheading</button>
        <button class="preset-btn" onclick="applyPreset(this,'body')">Body</button>
        <button class="preset-btn" onclick="applyPreset(this,'caption')">Caption</button>
        <button class="preset-btn" onclick="applyPreset(this,'custom')">커스텀</button>
      </div>
    </div>

    <div class="canvas" id="canvas" data-bg="theme">
      <div class="lines" id="lines"></div>
    </div>

    <div class="infobar">
      <div class="info-item">폰트 <b id="ib-font">Kudos Sans</b></div>
      <div class="info-item">크기 <b id="ib-size">—</b></div>
      <div class="info-item">행간 <b id="ib-lh">—</b></div>
      <div class="info-item">자간 <b id="ib-ls">—</b></div>
    </div>
  </main>
</div>

<script>
// ── FONTS ──
const FONTS = {
  kudos:      { label: 'Kudos Sans',  family: "'KudosSans', sans-serif" },
  pretendard: { label: 'Pretendard',  family: "'Pretendard', sans-serif" },
  wanted:     { label: 'Wanted Sans', family: "'Wanted Sans', sans-serif" },
  paperlogy:  { label: 'Paperlogy',   family: "'Paperlogy', sans-serif" },
  suit:       { label: 'SUIT',         family: "'SUIT', sans-serif" },
};
let gFont = 'kudos';

// ── WEIGHTS ──
const WEIGHTS = [
  { name: 'Thin',       num: 100 },
  { name: 'ExtraLight', num: 200 },
  { name: 'Light',      num: 300 },
  { name: 'Regular',    num: 400 },
  { name: 'Medium',     num: 500 },
  { name: 'SemiBold',   num: 600 },
  { name: 'Bold',       num: 700 },
  { name: 'ExtraBold',  num: 800 },
  { name: 'Black',      num: 900 },
];

// ── STATE ──
let gSize = 48, gLH = 1.10, gLS = -0.02;
let gWeight = 700;
let gTextColor = '#1A1916';
let lineData = {}; // id -> { weight, el, toolbar }

// ── FONT SWITCH ──
function setActiveFont(key, btn) {
  gFont = key;
  document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const family = FONTS[key].family;
  document.querySelectorAll('.line-text').forEach(el => el.style.fontFamily = family);
  document.getElementById('ib-font').textContent = FONTS[key].label;
  // update weight pill font display
  buildDefaultWeightList();
  markCustom();
}

// ── DEFAULT WEIGHT LIST ──
function buildDefaultWeightList() {
  const c = document.getElementById('defaultWeightList');
  c.innerHTML = '';
  WEIGHTS.forEach(w => {
    const d = document.createElement('div');
    d.className = 'weight-item' + (w.num === gWeight ? ' active' : '');
    const family = FONTS[gFont].family;
    d.innerHTML = `<span class="weight-name" style="font-family:${family};font-weight:${w.num}">${w.name}</span><span class="weight-num">${w.num}</span>`;
    d.onclick = () => { gWeight = w.num; buildDefaultWeightList(); markCustom(); };
    c.appendChild(d);
  });
}
// ── LINES ──
let lineCounter = 0;
const defaultTexts = [
  { text: '1. WE BELIEVE — 우리가 믿는 것', weight: 700 },
  { text: '우리는 믿습니다.\n모든 기업에는 결정적 순간이 있다는 것을.\n첫 외부 자본이 합류하는 순간.\n시장이 처음으로 가치를 묻는 순간.\n주주가 결정을 내리는 순간.\n그리고 다음의 여정이 시작되는 순간.', weight: 400 },
  { text: '그리고 우리는 더 깊이 믿습니다.\n결정적 순간은 하루아침에 만들어지지 않는다는 것을.\n오직 매일의 준비만이 그 순간을 만들고,\n매일의 신뢰만이 그 순간을 빛나게 한다는 것을.\n이 순간들이 기업의 일생을 만들고,\n이 일생의 매일이 모든 신뢰를 결정합니다.', weight: 300 },
  { text: 123456 1,200 32,741, weight: 700 },
  { text: '2. WE SEE — 우리가 보는 것', weight: 700 },
  { text: '우리는 봅니다.\n준비 없이 도착한 순간 앞에서,\n열심히 노력한 기업이 저평가되는 것을.\n본질적 가치가 왜곡되는 것을.\n정당한 노력이 기억되지 않는 것을.', weight: 400 },
  { text: '순간이 빛나지 못하는 이유는, 그 순간의 잘못이 아닙니다.\n그 순간을 만들어온 매일의 부재입니다.\n이것은 단지 정보의 격차가 아닙니다.\n이것은 매일의 신뢰가 단절된 결과입니다.\n신뢰가 매일 흐르지 않을 때,\n시장은 기업의 가치를 잘못 측정합니다.\n기업은 본업이 아닌 소통의 비용에 시간을 씁니다.\n그리고 1,600만 주주의 권리가 침묵됩니다.', weight: 300 },
  { text: '3. WE DIFFER — 우리는 다릅니다', weight: 700 },
  { text: '우리는 서비스 제공자가 아닙니다.\n우리는 평생의 신뢰 파트너입니다.\n우리는 순간을 만들지 않습니다.\n우리는 순간을 위한 매일을 만듭니다.', weight: 600 },
  { text: '우리는 거래로 일하지 않습니다. 우리는 관계로 일합니다.\n우리는 순간만 보지 않습니다. 우리는 전 생애주기의 매일을 함께합니다.\n우리는 영업으로 신뢰를 만들지 않습니다. 우리는 시간으로 신뢰를 쌓습니다.\n\n매일이 단단할 때, 순간은 저절로 빛납니다.\n매일이 정직할 때, 가치는 왜곡 없이 인정받습니다.', weight: 400 },
];

function addLine(text, weight, insertAfterWrap) {
  const id = ++lineCounter;
  const w = weight ?? gWeight;
  const family = FONTS[gFont].family;

  // wrapper
  const wrap = document.createElement('div');
  wrap.className = 'line-wrap';
  wrap.dataset.id = id;

  // textarea-like contenteditable
  const el = document.createElement('div');
  el.className = 'line-text';
  el.contentEditable = 'true';
  el.spellcheck = false;
  el.style.cssText = `font-family:${family}; font-size:${gSize}px; line-height:${gLH}; letter-spacing:${gLS}em; color:${gTextColor}; font-weight:${w};`;
  // Allow natural line breaks — do NOT intercept Enter
  el.innerHTML = text ? text.replace(/\n/g, '<br>') : '';
  el.addEventListener('input', () => markCustom());

  // toolbar (shown on hover/focus, pinned on click)
  const toolbar = document.createElement('div');
  toolbar.className = 'line-toolbar';

  const lcLabel = document.createElement('span');
  lcLabel.className = 'lc-label';
  lcLabel.textContent = 'Weight';

  const pills = document.createElement('div');
  pills.className = 'lc-pills';

  WEIGHTS.forEach(wt => {
    const p = document.createElement('span');
    p.className = 'lc-pill' + (wt.num === w ? ' active' : '');
    p.textContent = wt.name;
    p.style.cssText = `font-family:${family}; font-weight:${wt.num};`;
    p.onclick = () => {
      lineData[id].weight = wt.num;
      el.style.fontWeight = wt.num;
      pills.querySelectorAll('.lc-pill').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      markCustom();
    };
    pills.appendChild(p);
  });

  const actions = document.createElement('div');
  actions.className = 'lc-actions';

  const addBtn = document.createElement('button');
  addBtn.className = 'lc-btn';
  addBtn.textContent = '+ 줄 추가';
  addBtn.onclick = () => addLine('', gWeight, wrap);

  const delBtn = document.createElement('button');
  delBtn.className = 'lc-btn del';
  delBtn.textContent = '삭제';
  delBtn.onclick = () => {
    wrap.remove();
    delete lineData[id];
    markCustom();
  };

  actions.appendChild(addBtn);
  actions.appendChild(delBtn);

  toolbar.appendChild(lcLabel);
  toolbar.appendChild(pills);
  toolbar.appendChild(actions);

  // pin/unpin on focus/blur
  el.addEventListener('focus', () => toolbar.classList.add('pinned'));
  el.addEventListener('blur', () => {
    setTimeout(() => {
      if (!toolbar.matches(':hover')) toolbar.classList.remove('pinned');
    }, 150);
  });
  toolbar.addEventListener('mouseleave', () => {
    if (document.activeElement !== el) toolbar.classList.remove('pinned');
  });

  wrap.appendChild(el);
  wrap.appendChild(toolbar);

  if (insertAfterWrap) {
    insertAfterWrap.after(wrap);
  } else {
    document.getElementById('lines').appendChild(wrap);
  }

  lineData[id] = { weight: w, el, toolbar, pills };

  setTimeout(() => el.focus(), 10);
  updateInfoBar();
  return el;
}

// init lines
defaultTexts.forEach(d => addLine(d.text, d.weight));

// ── GLOBAL CONTROLS ──
function updateGlobal(type, val) {
  if (type === 'size') {
    gSize = +val;
    document.getElementById('vSize').textContent = val;
    document.getElementById('sSize').value = val;
  } else if (type === 'lh') {
    gLH = parseFloat(val);
    document.getElementById('vLH').textContent = parseFloat(val).toFixed(2);
    document.getElementById('sLH').value = val;
  } else if (type === 'ls') {
    gLS = parseFloat(val);
    document.getElementById('vLS').textContent = parseFloat(val).toFixed(3) + 'em';
    document.getElementById('sLS').value = val;
  }
  document.querySelectorAll('.line-text').forEach(el => {
    el.style.fontSize = gSize + 'px';
    el.style.lineHeight = gLH;
    el.style.letterSpacing = gLS + 'em';
  });
  updateInfoBar();
  markCustom();
}

function updateInfoBar() {
  document.getElementById('ib-size').textContent = gSize + 'px';
  document.getElementById('ib-lh').textContent = gLH.toFixed(2);
  document.getElementById('ib-ls').textContent = gLS.toFixed(3) + 'em';
}
updateInfoBar();

// ── PRESETS ──
const PRESETS = {
  display:    { size: 72,  lh: 1.00, ls: -0.035, weight: 800 },
  headline:   { size: 44,  lh: 1.10, ls: -0.025, weight: 700 },
  subheading: { size: 26,  lh: 1.30, ls: -0.015, weight: 500 },
  body:       { size: 16,  lh: 1.65, ls: -0.005, weight: 400 },
  caption:    { size: 12,  lh: 1.50, ls:  0.02,  weight: 300 },
};

function applyPreset(btn, key) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (!PRESETS[key]) return;
  const p = PRESETS[key];
  gWeight = p.weight;
  updateGlobal('size', p.size);
  updateGlobal('lh', p.lh);
  updateGlobal('ls', p.ls);
  buildDefaultWeightList();
}

function markCustom() {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[onclick*="custom"]').classList.add('active');
}

// ── THEME ──
function toggleTheme() {
  document.body.toggleAttribute('data-dark');
  const isDark = document.body.hasAttribute('data-dark');
  const newColor = isDark ? '#ffffff' : '#1A1916';
  gTextColor = newColor;
  document.querySelectorAll('.line-text').forEach(t => t.style.color = newColor);
  // sync text color swatches
  document.querySelectorAll('#textColors .bg-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.color === newColor);
  });
}

// ── BG ──
function setBG(el) {
  document.querySelectorAll('.bg-pill:not([data-color])').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('canvas').setAttribute('data-bg', el.dataset.bg);
}

// ── TEXT COLOR ──
function setTextColor(el) {
  document.querySelectorAll('#textColors .bg-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  gTextColor = el.dataset.color;
  document.querySelectorAll('.line-text').forEach(t => t.style.color = gTextColor);
  markCustom();
}

['sSize','sLH','sLS'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[onclick*="custom"]').classList.add('active');
  });
});
</script>
</body>
